<section id="github">
  <div class="section-inner">

    <div appScrollReveal>
      <div class="sec-label">04 — açıq mənbə</div>
      <h2 class="sec-title">GitHub <span class="hl">Fəaliyyəti</span></h2>
    </div>

    <div class="gh-wrap" appScrollReveal [revealDelay]="100">

      <div class="gh-header">
        <div class="gh-title">
          🐙 <span>github.com/dianamemmedova</span>
        </div>
        <div class="gh-stats">
          <div *ngFor="let stat of stats" class="ghs">
            <div class="ghs-n">{{ stat.num }}</div>
            <div class="ghs-l">{{ stat.label }}</div>
          </div>
        </div>
      </div>

      <div class="gh-body">

        <div class="contrib-label">Son 1 il fəaliyyəti</div>
        <div class="gh-grid">
          <div
            *ngFor="let box of contribBoxes()"
            class="gc"
            [ngClass]="'a' + box.level"
          ></div>
        </div>

        <div class="gh-legend">
          <span class="legend-text">Az</span>
          <div class="gc a0"></div>
          <div class="gc a1"></div>
          <div class="gc a2"></div>
          <div class="gc a3"></div>
          <div class="gc a4"></div>
          <span class="legend-text">Çox</span>
        </div>

        <div class="repos-grid">
          <a
            *ngFor="let repo of recentRepos"
            [href]="githubUrl"
            target="_blank"
            class="repo-card"
          >
            <div class="repo-top">
              <span class="repo-icon">📁</span>
              <span class="repo-name">{{ repo.name }}</span>
            </div>
            <div class="repo-desc">{{ repo.desc }}</div>
            <div class="repo-meta">
              <span class="repo-lang">
                <span
                  class="lang-dot"
                  [style.background]="getLangColor(repo.lang)"
                ></span>
                {{ repo.lang }}
              </span>
              <span class="repo-stars">⭐ {{ repo.stars }}</span>
            </div>
          </a>
        </div>

        <a [href]="githubUrl" target="_blank" class="gh-link">
          GitHub Profilinə bax ↗
        </a>

      </div>
    </div>

  </div>
</section>
